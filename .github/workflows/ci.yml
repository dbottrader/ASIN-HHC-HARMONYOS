name: Evidence CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evidence-gate:
    name: Evidence gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Repository inventory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          find . -path ./.git -prune -o -type f -print | sort > evidence/REPO_FILE_LIST.txt
          printf "file_count=%s\n" "$(wc -l < evidence/REPO_FILE_LIST.txt)" | tee evidence/INVENTORY_SUMMARY.txt

      - name: Refuse placeholder deployment workflows
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          if grep -RInE 'your-app-name|example-.*cluster|ccr\.ccs\.tencentyun\.com/demo|iks-test|tke-test|Hello, world!' .github/workflows > evidence/PLACEHOLDER_WORKFLOW_SCAN.txt; then
            cat evidence/PLACEHOLDER_WORKFLOW_SCAN.txt
            echo "::error::Placeholder deployment workflow marker detected. Replace or remove before promotion."
            exit 1
          fi
          echo "No placeholder deployment workflow markers detected." > evidence/PLACEHOLDER_WORKFLOW_SCAN.txt

      - name: Secret boundary scan
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          python3 - <<'PY'
          import pathlib
          import re
          import sys

          skip_dirs = {'.git', 'node_modules', 'dist', 'build', 'evidence'}
          findings = []
          private_key_re = re.compile(r'BEGIN (?:RSA |DSA |EC |OPENSSH |PGP )?PRIVATE KEY')
          assignment_re = re.compile(r'\b(?:MNEMONIC|PRIVATE_KEY|SECRET_KEY|API_KEY)\b\s*[:=]\s*["\'][^"\']{8,}', re.IGNORECASE)

          for path in pathlib.Path('.').rglob('*'):
              if not path.is_file():
                  continue
              if any(part in skip_dirs for part in path.parts):
                  continue
              try:
                  text = path.read_text(encoding='utf-8', errors='ignore')
              except Exception:
                  continue
              for line_number, line in enumerate(text.splitlines(), 1):
                  if '${{ secrets.' in line:
                      continue
                  if private_key_re.search(line) or assignment_re.search(line):
                      findings.append(f'{path}:{line_number}: potential hardcoded secret marker')

          report = pathlib.Path('evidence/SECRET_SCAN.txt')
          if findings:
              report.write_text('\n'.join(findings) + '\n', encoding='utf-8')
              print(report.read_text(encoding='utf-8'))
              sys.exit(1)
          report.write_text('No hardcoded private key or mnemonic patterns detected.\n', encoding='utf-8')
          PY

      - name: Set up Node.js when package.json exists
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: npm

      - name: Install, build, and test Node project when present
        if: ${{ hashFiles('package.json') != '' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build --if-present
          npm test --if-present

      - name: Record absent app scaffold when package.json is missing
        if: ${{ hashFiles('package.json') == '' }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          cat > evidence/NO_PACKAGE_JSON.md <<'EOF'
          # Runtime scaffold not detected

          No package.json was present at this commit, so Node install/build/test steps were intentionally skipped.

          This is an honest E1 automation/evidence scaffold result, not runtime proof.
          EOF

      - name: Generate evidence status
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          cat > evidence/EVIDENCE_STATUS.md <<EOF
          # ASIN-HHC-HARMONYOS Evidence CI Status

          Repository: ${GITHUB_REPOSITORY}
          Commit: ${GITHUB_SHA}
          Workflow: Evidence CI
          UTC: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          Status: E1_AUTOMATION_EVIDENCE_SCAFFOLD
          Authority: NONE
          Production readiness: NOT_DEMONSTRATED
          Clinical readiness: PROHIBITED

          This workflow verifies repository inventory, refuses placeholder cloud-deployment markers, scans for obvious hardcoded secret patterns, conditionally runs Node build/test only when a package manifest exists, and emits an evidence artifact.
          EOF

      - name: Generate SHA256 manifest
        shell: bash
        run: |
          set -euo pipefail
          find . \
            -path ./.git -prune -o \
            -path ./evidence/SHA256SUMS.txt -prune -o \
            -type f -print0 | sort -z | xargs -0 sha256sum > evidence/SHA256SUMS.txt

      - name: Upload evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: evidence-ci-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
